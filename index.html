<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DriveBeats</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #111118;
  --card:     #17171f;
  --card-h:   #1f1f2e;
  --border:   rgba(255,255,255,0.07);
  --accent:   #1ed760;
  --text:     #e8e8f0;
  --muted:    #5a5a78;
  --warn:     #ff5f5f;
  --r:        12px;
  --ph:       88px;
  --sb:       232px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  display:grid;
  grid-template-columns:var(--sb) 1fr;
  grid-template-rows:1fr var(--ph);
  grid-template-areas:"sb main""player player";
  height:100vh;
}

/* ── SIDEBAR ── */
#sb{
  grid-area:sb;
  background:#080810;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.logo{
  padding:22px 20px 20px;
  font-family:'Syne',sans-serif;
  font-size:1.3rem;font-weight:800;
  color:var(--accent);flex-shrink:0;
}
.logo em{color:var(--text);font-style:normal}
.nav{padding:0 10px;flex-shrink:0}
.ni{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  font-size:.85rem;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.ni:hover,.ni.on{background:var(--card);color:var(--text)}
.ni svg{flex-shrink:0}
.divider{height:1px;background:var(--border);margin:14px 18px}
.lib-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 22px;margin-bottom:8px;flex-shrink:0}
.lib{flex:1;overflow-y:auto;padding:0 10px 10px}
.li{
  padding:7px 12px;border-radius:6px;
  font-size:.8rem;color:var(--muted);
  cursor:pointer;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.li:hover{color:var(--text);background:var(--card)}
.li.on{color:var(--accent)}

/* ── MAIN ── */
#main{
  grid-area:main;
  overflow-y:auto;
  padding:28px 28px 20px;
  background:linear-gradient(160deg,#16162a 0%,var(--bg) 380px);
}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.top-bar h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800}
.rbtn{
  display:flex;align-items:center;gap:7px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:50px;padding:7px 15px;
  font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;
}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.rbtn.spin svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sec-title{
  font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.badge{
  font-size:.7rem;font-weight:500;background:var(--card);
  border:1px solid var(--border);color:var(--muted);
  border-radius:50px;padding:2px 9px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;margin-bottom:36px;
}
.card{
  background:var(--card);border-radius:var(--r);padding:14px;
  cursor:pointer;transition:background .2s,transform .2s;position:relative;
}
.card:hover{background:var(--card-h);transform:translateY(-2px)}
.card.on{outline:2px solid var(--accent)}
.thumb{
  position:relative;border-radius:9px;overflow:hidden;
  margin-bottom:12px;aspect-ratio:1;background:#1a1a2e;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tfb{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e,#252540);
}
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.38);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.card:hover .overlay{opacity:1}
.pbig{
  width:44px;height:44px;background:var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(30,215,96,.4);transition:transform .15s;
}
.pbig:hover{transform:scale(1.1)}
.sname{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sart{font-size:.74rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{
  position:absolute;top:9px;right:9px;width:9px;height:9px;
  background:var(--accent);border-radius:50%;display:none;
  animation:pulse 1.3s ease-in-out infinite;
}
.card.on .dot{display:block}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.4}}

/* states */
.sbox{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 0;gap:12px;color:var(--muted);font-size:.87rem;
}

/* ── PLAYER ── */
#player{
  grid-area:player;
  background:#09090f;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  align-items:center;padding:0 20px;gap:12px;
}
.pinfo{display:flex;align-items:center;gap:11px;min-width:0}
.pthumb{
  width:52px;height:52px;border-radius:7px;
  object-fit:cover;flex-shrink:0;background:var(--card);
}
.ptfb{
  width:52px;height:52px;border-radius:7px;flex-shrink:0;
  background:var(--card);display:flex;align-items:center;justify-content:center;
}
.pmeta{min-width:0}
.ptitle{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.partist{font-size:.73rem;color:var(--muted)}
.hbtn{
  background:none;border:none;cursor:pointer;color:var(--muted);
  padding:4px;margin-left:6px;transition:color .2s;flex-shrink:0;
}
.hbtn:hover{color:var(--warn)}
.hbtn.on{color:var(--warn)}

.pctrl{display:flex;flex-direction:column;align-items:center;gap:7px}
.cbtns{display:flex;align-items:center;gap:14px}
.cbtn{
  background:none;border:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,transform .1s;padding:4px;
}
.cbtn:hover{color:var(--text);transform:scale(1.1)}
.cbtn.on{color:var(--accent)}
.ppbtn{
  width:36px;height:36px;background:var(--text);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;color:#000;
  transition:transform .1s,background .15s;
}
.ppbtn:hover{transform:scale(1.08);background:#fff}

.prog{display:flex;align-items:center;gap:9px;width:100%;max-width:480px}
.tl{font-size:.7rem;color:var(--muted);min-width:32px}
.tl.r{text-align:right}
.bar{
  flex:1;height:4px;background:var(--card);border-radius:2px;
  cursor:pointer;position:relative;overflow:hidden;transition:height .15s;
}
.bar::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:var(--p,0%);background:var(--accent);border-radius:2px;
  transition:width .1s linear;
}
.bar:hover{height:6px}

.pright{display:flex;align-items:center;justify-content:flex-end;gap:9px}
.vwrap{display:flex;align-items:center;gap:7px}
.vslider{
  -webkit-appearance:none;width:76px;height:4px;
  background:var(--card);border-radius:2px;outline:none;cursor:pointer;
}
.vslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--text);cursor:pointer;
}

audio{display:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#toast{
  position:fixed;bottom:100px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:9px 18px;font-size:.82rem;
  opacity:0;transition:all .3s;pointer-events:none;z-index:99;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sb">
  <div class="logo">Drive<em>Beats</em></div>
  <div class="nav">
    <div class="ni on" onclick="showView('home',this)">
      <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
    </div>
    <div class="ni" onclick="showView('liked',this)">
      <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Liked Songs
    </div>
  </div>
  <div class="divider"></div>
  <div class="lib-label">Library</div>
  <div class="lib" id="lib"></div>
</nav>

<!-- MAIN -->
<main id="main">
  <div class="top-bar">
    <h1 id="vtitle">All Songs</h1>
    <button class="rbtn" id="rbtn" onclick="loadSongs()">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Refresh
    </button>
  </div>
  <div id="content"></div>
</main>

<!-- PLAYER -->
<div id="player">
  <div class="pinfo">
    <img class="pthumb" id="pimg" src="" alt="" onerror="this.style.display='none';document.getElementById('ptfb').style.display='flex'"/>
    <div class="ptfb" id="ptfb">
      <svg width="20" height="20" fill="var(--muted)" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>
    </div>
    <div class="pmeta">
      <div class="ptitle" id="ptitle">No track selected</div>
      <div class="partist" id="partist">—</div>
    </div>
    <button class="hbtn" id="hbtn" onclick="toggleLike()">
      <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
  </div>

  <div class="pctrl">
    <div class="cbtns">
      <button class="cbtn" id="shbtn" onclick="toggleShuffle()" title="Shuffle">
        <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="cbtn" onclick="playPrev()">
        <svg width="21" height="21" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ppbtn" id="ppbtn" onclick="togglePlay()">
        <svg id="ppico" width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="cbtn" onclick="playNext()">
        <svg width="21" height="21" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="cbtn on" id="rpbtn" onclick="toggleRepeat()" title="Repeat">
        <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
    <div class="prog">
      <span class="tl" id="tcur">0:00</span>
      <div class="bar" id="bar" onclick="seek(event)"></div>
      <span class="tl r" id="tdur">0:00</span>
    </div>
  </div>

  <div class="pright">
    <div class="vwrap">
      <button class="cbtn" onclick="toggleMute()">
        <svg id="vico" width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <input type="range" class="vslider" id="vsl" min="0" max="100" value="80" oninput="setVol(this.value)"/>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="aud"></audio>

<script>
/* ════════════════════════════════════════
   ▼▼▼  PASTE YOUR DETAILS HERE  ▼▼▼
════════════════════════════════════════ */
const API_KEY   = 'AIzaSyBrCnBFK8l6a_SwOx95e1oGHoyPVyce0gk';
const FOLDER_ID = '13_GYBfUCgQrJce5dqon4f3LcMtyWh6XZ';
/* ════════════════════════════════════════
   ▲▲▲  THAT'S ALL YOU NEED TO EDIT  ▲▲▲
════════════════════════════════════════ */

let songs = [], liked = JSON.parse(localStorage.getItem('db_liked')||'[]');
let idx = -1, shuffle = false, repeat = 1, shuffleOrder = [];
let view = 'home';
const aud = document.getElementById('aud');

/* ── FETCH ── */
async function loadSongs() {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spin');
  setState('load');
  try {
    const types = "mimeType='audio/mpeg' or mimeType='audio/mp3' or mimeType='audio/wav' or mimeType='audio/ogg' or mimeType='audio/flac' or mimeType='audio/aac' or mimeType='audio/x-m4a'";
    const q = encodeURIComponent(`'${FOLDER_ID}' in parents and (${types}) and trashed=false`);
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType,thumbnailLink)&key=${API_KEY}&pageSize=200`);
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message||'API error'); }
    const d = await r.json();

    // also fetch images for thumbnail matching
    const iq = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
    const ir = await fetch(`https://www.googleapis.com/drive/v3/files?q=${iq}&fields=files(id,name)&key=${API_KEY}&pageSize=200`);
    const imgs = ir.ok ? (await ir.json()).files || [] : [];

    songs = (d.files||[]).map(f => {
      const base = f.name.replace(/\.[^.]+$/,'').toLowerCase();
      const img = imgs.find(i => i.name.replace(/\.[^.]+$/,'').toLowerCase() === base);
      const {title,artist} = parse(f.name);
      return { id:f.id, name:title, artist, raw:f.name,
               thumbId: img?.id || null, driveThumb: f.thumbnailLink||null };
    });

    render(filtered()); buildLib();
    toast(`${songs.length} song${songs.length!==1?'s':''} loaded`);
  } catch(e) {
    setState('err', e.message);
    toast('Error: '+e.message);
  }
  btn.classList.remove('spin');
}

function parse(fn) {
  const base = fn.replace(/\.[^.]+$/,'');
  if (base.includes(' - ')) {
    const p = base.split(' - ');
    return { artist:p[0].trim(), title:p.slice(1).join(' - ').trim() };
  }
  return { artist:'Unknown Artist', title:base };
}
function thumb(s) {
  if (s.thumbId) return `https://drive.google.com/thumbnail?id=${s.thumbId}&sz=w400`;
  return s.driveThumb || null;
}
function streamUrl(id) {
  return `https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${API_KEY}`;
}

/* ── VIEWS ── */
function showView(v, el) {
  view = v;
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  el?.classList.add('on');
  document.getElementById('vtitle').textContent = v==='liked' ? 'Liked Songs' : 'All Songs';
  render(filtered());
}
function filtered() {
  return view==='liked' ? songs.filter(s=>liked.includes(s.id)) : songs;
}

/* ── RENDER ── */
function setState(t, msg='') {
  const c = document.getElementById('content');
  if (t==='load') c.innerHTML = `<div class="sbox"><svg width="38" height="38" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path stroke-linecap="round" d="M12 2a10 10 0 0110 10"/></svg><p>Loading from Google Drive…</p></div>`;
  else if (t==='err') c.innerHTML = `<div class="sbox"><svg width="38" height="38" fill="var(--warn)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><p style="color:var(--warn)">${msg}</p><p style="font-size:.78rem;margin-top:4px">Check API Key, Folder ID, and that the folder is shared publicly.</p></div>`;
}

const note = `<svg width="34" height="34" fill="var(--muted)" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>`;

function render(list) {
  const c = document.getElementById('content');
  if (!list.length) {
    c.innerHTML = `<div class="sbox">${note}<p>${view==='liked'?'No liked songs yet':'No songs found in this folder'}</p></div>`;
    return;
  }
  c.innerHTML = `
    <div class="sec-title">${view==='liked'?'❤️ Liked':'🎵 Songs'}<span class="badge">${list.length}</span></div>
    <div class="grid">
      ${list.map(s => {
        const gi = songs.indexOf(s);
        const t = thumb(s);
        return `<div class="card${gi===idx?' on':''}" onclick="play(${gi})" data-id="${s.id}">
          <div class="dot"></div>
          <div class="thumb">
            ${t
              ? `<img src="${t}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="tfb" style="display:none">${note}</div>`
              : `<div class="tfb">${note}</div>`}
            <div class="overlay"><div class="pbig"><svg width="18" height="18" fill="#000" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
          </div>
          <div class="sname" title="${s.name}">${s.name}</div>
          <div class="sart">${s.artist}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function buildLib() {
  document.getElementById('lib').innerHTML = songs.map((s,i)=>
    `<div class="li${i===idx?' on':''}" onclick="play(${i})" title="${s.name}">${s.name}</div>`
  ).join('');
}

/* ── PLAYBACK ── */
function play(i) {
  if (i<0||i>=songs.length) return;
  idx = i;
  const s = songs[i];
  aud.src = streamUrl(s.id);
  aud.volume = document.getElementById('vsl').value/100;
  aud.play().catch(e=>toast('Playback error'));
  updatePlayer(s);
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('on'));
  document.querySelector(`.card[data-id="${s.id}"]`)?.classList.add('on');
  buildLib();
}

function updatePlayer(s) {
  document.getElementById('ptitle').textContent = s.name;
  document.getElementById('partist').textContent = s.artist;
  const t = thumb(s);
  const img = document.getElementById('pimg'), fb = document.getElementById('ptfb');
  if (t) { img.src=t; img.style.display='block'; fb.style.display='none'; }
  else { img.style.display='none'; fb.style.display='flex'; }
  document.getElementById('hbtn').classList.toggle('on', liked.includes(s.id));
}

function togglePlay() {
  if (!aud.src) return;
  aud.paused ? aud.play() : aud.pause();
}

function playNext() {
  if (!songs.length) return;
  let n;
  if (shuffle) { const p=shuffleOrder.indexOf(idx); n=shuffleOrder[(p+1)%shuffleOrder.length]; }
  else n=(idx+1)%songs.length;
  play(n);
}
function playPrev() {
  if (!songs.length) return;
  if (aud.currentTime>3) { aud.currentTime=0; return; }
  let p;
  if (shuffle) { const pos=shuffleOrder.indexOf(idx); p=shuffleOrder[(pos-1+shuffleOrder.length)%shuffleOrder.length]; }
  else p=(idx-1+songs.length)%songs.length;
  play(p);
}

function toggleShuffle() {
  shuffle=!shuffle;
  document.getElementById('shbtn').classList.toggle('on',shuffle);
  if (shuffle) shuffleOrder=[...Array(songs.length).keys()].sort(()=>Math.random()-.5);
  toast(shuffle?'Shuffle on':'Shuffle off');
}

function toggleRepeat() {
  repeat=(repeat+1)%3;
  const btn=document.getElementById('rpbtn');
  btn.classList.toggle('on',repeat>0);
  // swap icon for repeat-one
  btn.innerHTML = repeat===2
    ? `<svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2v-5h-1l-2 1v1h1.5v3H13z"/></svg>`
    : `<svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>`;
  toast(['Repeat off','Repeat all','Repeat one'][repeat]);
}

function toggleLike() {
  if (idx<0) return;
  const id=songs[idx].id;
  liked=liked.includes(id)?liked.filter(x=>x!==id):[...liked,id];
  localStorage.setItem('db_liked',JSON.stringify(liked));
  document.getElementById('hbtn').classList.toggle('on',liked.includes(id));
  toast(liked.includes(id)?'Added to liked':'Removed from liked');
  if (view==='liked') render(filtered());
}

function toggleMute() {
  aud.muted=!aud.muted;
  document.getElementById('vico').innerHTML = aud.muted
    ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25A6.97 6.97 0 0114 18.92v2.06A8.99 8.99 0 0117.73 19l2 2L21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}
function setVol(v) { aud.volume=v/100; aud.muted=false; }

/* ── PROGRESS ── */
aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  document.getElementById('bar').style.setProperty('--p',(aud.currentTime/aud.duration*100)+'%');
  document.getElementById('tcur').textContent=fmt(aud.currentTime);
  document.getElementById('tdur').textContent=fmt(aud.duration);
});
aud.addEventListener('play',()=>{ document.getElementById('ppico').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; });
aud.addEventListener('pause',()=>{ document.getElementById('ppico').innerHTML='<path d="M8 5v14l11-7z"/>'; });
aud.addEventListener('ended',()=>{
  if(repeat===2){aud.play();return;}
  playNext();
});

function seek(e) {
  if(!aud.duration)return;
  aud.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*aud.duration;
}
function fmt(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

/* ── TOAST ── */
let tt;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2300);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')playNext();
  if(e.code==='ArrowLeft')playPrev();
});

/* ── INIT ── */
loadSongs();
</script>
</body>
</html>
