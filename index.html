<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DriveBeats</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<nav id="sidebar">
    <div class="logo">Drive<span>Beats</span></div>

    <button id="menuBtn">☰</button>

    <div class="nav-links">
        <button onclick="showAll()">All Songs</button>
        <button onclick="showLiked()">Liked</button>
    </div>
</nav>

<main>

<header>
    <h1>DriveBeats</h1>

    <div class="actions">
        <input
            type="text"
            id="search"
            placeholder="Search songs..."
        >

        <button onclick="loadSongs()">Refresh</button>
    </div>
</header>

<div id="songs"></div>

</main>

<footer id="player">

<div class="player-info">
    <img id="cover" src="">
    <div>
        <h3 id="title">No song selected</h3>
        <p id="artist">—</p>
    </div>
</div>

<div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">▶</button>
    <button onclick="nextSong()">⏭</button>
</div>

</footer>

<audio id="audio"></audio>

<script src="app.js"></script>

</body>
</html>
