<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DriveBeats</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0a0a0f;
  --card:    #17171f;
  --card-h:  #1f1f2e;
  --border:  rgba(255,255,255,0.07);
  --accent:  #1ed760;
  --text:    #e8e8f0;
  --muted:   #5a5a78;
  --warn:    #ff5f5f;
  --r:       12px;
  --sb:      220px;
  --ph:      86px;
  --nav-h:   60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
body{overflow:hidden}

/* ════ DESKTOP LAYOUT ════ */
.layout {
  display:grid;
  grid-template-columns:var(--sb) 1fr;
  grid-template-rows:1fr var(--ph);
  grid-template-areas:"sb main""player player";
  height:100vh;
}

/* ── SIDEBAR (desktop) ── */
#sb {
  grid-area:sb;
  background:#080810;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.logo {
  padding:20px 18px 16px;
  font-family:'Syne',sans-serif;
  font-size:1.25rem;font-weight:800;color:var(--accent);flex-shrink:0;
}
.logo em{color:var(--text);font-style:normal}
.sb-nav{padding:0 8px;flex-shrink:0}
.ni {
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  font-size:.84rem;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.ni:hover,.ni.on{background:var(--card);color:var(--text)}
.divider{height:1px;background:var(--border);margin:12px 16px}
.lib-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 20px;margin-bottom:8px;flex-shrink:0}
.lib{flex:1;overflow-y:auto;padding:0 8px 8px}
.li{
  padding:7px 12px;border-radius:6px;font-size:.78rem;color:var(--muted);
  cursor:pointer;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.li:hover{color:var(--text);background:var(--card)}
.li.on{color:var(--accent)}

/* ── MAIN ── */
#main {
  grid-area:main;
  overflow-y:auto;
  padding:24px 24px 16px;
  background:linear-gradient(160deg,#16162a 0%,var(--bg) 320px);
}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.top-bar h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.rbtn{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:50px;padding:7px 14px;
  font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.rbtn.spin svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sec-title{
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.badge{
  font-size:.68rem;background:var(--card);border:1px solid var(--border);
  color:var(--muted);border-radius:50px;padding:2px 8px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:14px;margin-bottom:30px;
}
.card{
  background:var(--card);border-radius:var(--r);padding:12px;
  cursor:pointer;transition:background .2s,transform .2s;position:relative;
}
.card:hover{background:var(--card-h);transform:translateY(-2px)}
.card.on{outline:2px solid var(--accent)}
.thumb{
  position:relative;border-radius:9px;overflow:hidden;
  margin-bottom:10px;aspect-ratio:1;background:#1a1a2e;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tfb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#252540)}
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.38);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.card:hover .overlay,.card.on .overlay{opacity:1}
.pbig{
  width:40px;height:40px;background:var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(30,215,96,.4);
}
.dot{
  position:absolute;top:8px;right:8px;width:8px;height:8px;
  background:var(--accent);border-radius:50%;display:none;
  animation:pulse 1.3s ease-in-out infinite;
}
.card.on .dot{display:block}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.4}}
.sname{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.sart{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:12px;color:var(--muted);font-size:.85rem;text-align:center}

/* ── PLAYER BAR ── */
#player {
  grid-area:player;
  background:#09090f;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  align-items:center;padding:0 16px;gap:8px;
  height:var(--ph);
}
.pinfo{display:flex;align-items:center;gap:10px;min-width:0}
.pthumb{width:48px;height:48px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--card)}
.ptfb{width:48px;height:48px;border-radius:7px;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center}
.pmeta{min-width:0}
.ptitle{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.partist{font-size:.7rem;color:var(--muted)}
.hbtn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;margin-left:4px;transition:color .2s;flex-shrink:0}
.hbtn:hover{color:var(--warn)}.hbtn.on{color:var(--warn)}

.pctrl{display:flex;flex-direction:column;align-items:center;gap:6px}
.cbtns{display:flex;align-items:center;gap:12px}
.cbtn{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .15s,transform .1s;padding:3px}
.cbtn:hover{color:var(--text);transform:scale(1.1)}.cbtn.on{color:var(--accent)}
.ppbtn{width:34px;height:34px;background:var(--text);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#000;transition:transform .1s,background .15s}
.ppbtn:hover{transform:scale(1.08);background:#fff}

.prog{display:flex;align-items:center;gap:8px;width:100%;max-width:460px}
.tl{font-size:.68rem;color:var(--muted);min-width:30px}
.tl.r{text-align:right}
.bar{flex:1;height:4px;background:var(--card);border-radius:2px;cursor:pointer;position:relative;overflow:hidden;transition:height .15s}
.bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:var(--p,0%);background:var(--accent);border-radius:2px;transition:width .1s linear}
.bar:hover{height:6px}

.pright{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.vwrap{display:flex;align-items:center;gap:6px}
.vslider{-webkit-appearance:none;width:70px;height:4px;background:var(--card);border-radius:2px;outline:none;cursor:pointer}
.vslider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--text);cursor:pointer}

/* ════ MOBILE BOTTOM NAV ════ */
#mob-nav {
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#09090f;
  border-top:1px solid var(--border);
  height:var(--nav-h);
  z-index:200;
  justify-content:space-around;align-items:center;
}
.mn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--muted);font-size:.62rem;font-weight:500;
  padding:6px 16px;transition:color .15s;flex:1;
}
.mn-item.on{color:var(--accent)}
.mn-item svg{margin-bottom:1px}

/* ════ MOBILE PLAYER (mini bar above nav) ════ */
#mob-player {
  display:none;
  position:fixed;bottom:var(--nav-h);left:0;right:0;
  background:#12121e;
  border-top:1px solid var(--border);
  padding:10px 14px;
  z-index:199;
  align-items:center;gap:10px;
}
.mp-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.mp-thumb{width:40px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--card)}
.mp-tfb{width:40px;height:40px;border-radius:7px;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center}
.mp-meta{min-width:0}
.mp-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-artist{font-size:.68rem;color:var(--muted)}
.mp-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mp-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:5px;transition:color .15s}
.mp-btn:hover{color:var(--text)}
.mp-play{width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#000}
.mob-prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--card)}
.mob-prog-fill{height:100%;background:var(--accent);width:var(--p,0%);transition:width .1s linear}

/* ════ MOBILE MAIN PANEL ════ */
#mob-home, #mob-liked, #mob-library {
  display:none;
  position:fixed;top:0;left:0;right:0;
  bottom:calc(var(--nav-h) + 52px);
  overflow-y:auto;
  background:linear-gradient(160deg,#16162a 0%,var(--bg) 280px);
  padding:16px 14px 10px;
  z-index:100;
}
#mob-home.active,#mob-liked.active,#mob-library.active{display:block}

.mob-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mob-top h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}

/* mobile grid — 2 columns */
.mob-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}

/* mobile library list */
.mob-list-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .15s;
}
.mob-list-item:hover{background:var(--card)}
.mob-list-item.on{background:var(--card)}
.ml-thumb{width:44px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center}
.ml-thumb img{width:44px;height:44px;border-radius:7px;object-fit:cover}
.ml-meta{min-width:0;flex:1}
.ml-name{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml-art{font-size:.72rem;color:var(--muted)}
.ml-play{color:var(--accent);flex-shrink:0}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
audio{display:none}

/* TOAST */
#toast{
  position:fixed;bottom:120px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:8px 16px;font-size:.8rem;
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════ RESPONSIVE ════ */
@media (max-width: 640px) {
  .layout{display:none !important}
  #mob-nav{display:flex}
  #mob-player{display:flex}
  #mob-home{display:block}
  #toast{bottom:calc(var(--nav-h) + 60px)}
}
@media (min-width: 641px) {
  #mob-nav,#mob-player,#mob-home,#mob-liked,#mob-library{display:none !important}
  .layout{display:grid}
}
</style>
</head>
<body>

<!-- ════════════ DESKTOP ════════════ -->
<div class="layout">
  <nav id="sb">
    <div class="logo">Drive<em>Beats</em></div>
    <div class="sb-nav">
      <div class="ni on" onclick="showView('home',this)">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
      </div>
      <div class="ni" onclick="showView('liked',this)">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Liked
      </div>
    </div>
    <div class="divider"></div>
    <div class="lib-label">Library</div>
    <div class="lib" id="lib"></div>
  </nav>

  <main id="main">
    <div class="top-bar">
      <h1 id="vtitle">All Songs</h1>
      <button class="rbtn" id="rbtn" onclick="loadSongs()">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Refresh
      </button>
    </div>
    <div id="content"></div>
  </main>

  <div id="player">
    <div class="pinfo">
      <img class="pthumb" id="pimg" src="" alt="" onerror="this.style.display='none';document.getElementById('ptfb').style.display='flex'"/>
      <div class="ptfb" id="ptfb"><svg width="18" height="18" fill="var(--muted)" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg></div>
      <div class="pmeta">
        <div class="ptitle" id="ptitle">No track</div>
        <div class="partist" id="partist">—</div>
      </div>
      <button class="hbtn" id="hbtn" onclick="toggleLike()"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
    </div>
    <div class="pctrl">
      <div class="cbtns">
        <button class="cbtn" id="shbtn" onclick="toggleShuffle()"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
        <button class="cbtn" onclick="playPrev()"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="ppbtn" id="ppbtn" onclick="togglePlay()"><svg id="ppico" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="cbtn" onclick="playNext()"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>
        <button class="cbtn on" id="rpbtn" onclick="toggleRepeat()"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
      </div>
      <div class="prog">
        <span class="tl" id="tcur">0:00</span>
        <div class="bar" id="bar" onclick="seek(event)"></div>
        <span class="tl r" id="tdur">0:00</span>
      </div>
    </div>
    <div class="pright">
      <div class="vwrap">
        <button class="cbtn" onclick="toggleMute()"><svg id="vico" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <input type="range" class="vslider" id="vsl" min="0" max="100" value="80" oninput="setVol(this.value)"/>
      </div>
    </div>
  </div>
</div>

<!-- ════════════ MOBILE ════════════ -->

<!-- Home Panel -->
<div id="mob-home" class="active">
  <div class="mob-top">
    <h1>All Songs</h1>
    <button class="rbtn" onclick="loadSongs()" id="mob-rbtn">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Refresh
    </button>
  </div>
  <div id="mob-content"></div>
</div>

<!-- Liked Panel -->
<div id="mob-liked">
  <div class="mob-top"><h1>❤️ Liked Songs</h1></div>
  <div id="mob-liked-content"></div>
</div>

<!-- Library Panel -->
<div id="mob-library">
  <div class="mob-top"><h1>Library</h1></div>
  <div id="mob-lib-content"></div>
</div>

<!-- Mini Player -->
<div id="mob-player">
  <div class="mob-prog"><div class="mob-prog-fill" id="mob-prog-fill"></div></div>
  <div class="mp-info">
    <img class="mp-thumb" id="mp-img" src="" alt="" onerror="this.style.display='none';document.getElementById('mp-tfb').style.display='flex'"/>
    <div class="mp-tfb" id="mp-tfb"><svg width="16" height="16" fill="var(--muted)" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg></div>
    <div class="mp-meta">
      <div class="mp-title" id="mp-title">No track</div>
      <div class="mp-artist" id="mp-artist">—</div>
    </div>
  </div>
  <div class="mp-btns">
    <button class="mp-btn" onclick="playPrev()"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button class="mp-play" id="mp-play" onclick="togglePlay()"><svg id="mp-ico" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="mp-btn" onclick="playNext()"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>
    <button class="mp-btn hbtn" id="mob-hbtn" onclick="toggleLike()"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
  </div>
</div>

<!-- Bottom Nav -->
<div id="mob-nav">
  <div class="mn-item on" id="mn-home" onclick="mobView('home')">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </div>
  <div class="mn-item" id="mn-liked" onclick="mobView('liked')">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Liked
  </div>
  <div class="mn-item" id="mn-library" onclick="mobView('library')">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>Library
  </div>
</div>

<div id="toast"></div>
<audio id="aud"></audio>

<script>
/* ════════════════════════════
   PASTE YOUR DETAILS HERE
════════════════════════════ */
const API_KEY   = 'AIzaSyBrCnBFK8l6a_SwOx95e1oGHoyPVyce0gk';
const FOLDER_ID = '13_GYBfUCgQrJce5dqon4f3LcMtyWh6XZ';
/* ════════════════════════════ */

let songs=[], liked=JSON.parse(localStorage.getItem('db_liked')||'[]');
let idx=-1, shuffle=false, repeat=1, shuffleOrder=[];
let deskView='home', mobCurrentView='home';
const aud=document.getElementById('aud');
const NOTE=`<svg width="30" height="30" fill="var(--muted)" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>`;

/* ── LOAD ── */
async function loadSongs() {
  ['rbtn','mob-rbtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('spin')});
  setDesk('load'); setMob('load');
  try {
    const types="mimeType='audio/mpeg' or mimeType='audio/mp3' or mimeType='audio/wav' or mimeType='audio/ogg' or mimeType='audio/flac' or mimeType='audio/aac' or mimeType='audio/x-m4a'";
    const q=encodeURIComponent(`'${FOLDER_ID}' in parents and (${types}) and trashed=false`);
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType,thumbnailLink)&key=${API_KEY}&pageSize=200`);
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error');}
    const d=await r.json();
    const iq=encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
    const ir=await fetch(`https://www.googleapis.com/drive/v3/files?q=${iq}&fields=files(id,name)&key=${API_KEY}&pageSize=200`);
    const imgs=ir.ok?(await ir.json()).files||[];
    songs=(d.files||[]).map(f=>{
      const base=f.name.replace(/\.[^.]+$/,'').toLowerCase();
      const img=imgs.find(i=>i.name.replace(/\.[^.]+$/,'').toLowerCase()===base);
      const {title,artist}=parse(f.name);
      return{id:f.id,name:title,artist,thumbId:img?.id||null,driveThumb:f.thumbnailLink||null};
    });
    renderAll();
    toast(`${songs.length} song${songs.length!==1?'s':''} loaded`);
  } catch(e){
    setDesk('err',e.message); setMob('err',e.message);
    toast('Error: '+e.message);
  }
  ['rbtn','mob-rbtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('spin')});
}

function parse(fn){
  const base=fn.replace(/\.[^.]+$/,'');
  if(base.includes(' - ')){const p=base.split(' - ');return{artist:p[0].trim(),title:p.slice(1).join(' - ').trim()};}
  return{artist:'Unknown Artist',title:base};
}
function thumb(s){
  if(s.thumbId)return`https://drive.google.com/thumbnail?id=${s.thumbId}&sz=w400`;
  return s.driveThumb||null;
}
function streamUrl(id){return`https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${API_KEY}`;}

/* ── RENDER ALL ── */
function renderAll(){
  renderDesk(deskView==='liked'?songs.filter(s=>liked.includes(s.id)):songs);
  renderMobHome(songs);
  renderMobLiked();
  renderMobLib();
}

/* ── DESKTOP RENDER ── */
function showView(v,el){
  deskView=v;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  el?.classList.add('on');
  document.getElementById('vtitle').textContent=v==='liked'?'Liked Songs':'All Songs';
  renderDesk(v==='liked'?songs.filter(s=>liked.includes(s.id)):songs);
}

function setDesk(t,msg=''){
  const c=document.getElementById('content');
  if(t==='load')c.innerHTML=`<div class="sbox"><svg width="36" height="36" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path stroke-linecap="round" d="M12 2a10 10 0 0110 10"/></svg><p>Loading…</p></div>`;
  else if(t==='err')c.innerHTML=`<div class="sbox"><p style="color:var(--warn)">${msg}</p><p style="font-size:.78rem;margin-top:4px">Check API Key, Folder ID and folder sharing.</p></div>`;
}
function renderDesk(list){
  const c=document.getElementById('content');
  if(!list.length){c.innerHTML=`<div class="sbox">${NOTE}<p>${deskView==='liked'?'No liked songs yet':'No songs found'}</p></div>`;return;}
  c.innerHTML=`<div class="sec-title">🎵 Songs<span class="badge">${list.length}</span></div><div class="grid">${list.map(s=>{
    const gi=songs.indexOf(s),t=thumb(s);
    return`<div class="card${gi===idx?' on':''}" onclick="play(${gi})" data-id="${s.id}">
      <div class="dot"></div>
      <div class="thumb">${t?`<img src="${t}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="tfb" style="display:none">${NOTE}</div>`:`<div class="tfb">${NOTE}</div>`}
        <div class="overlay"><div class="pbig"><svg width="16" height="16" fill="#000" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      </div>
      <div class="sname" title="${s.name}">${s.name}</div>
      <div class="sart">${s.artist}</div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('lib').innerHTML=songs.map((s,i)=>`<div class="li${i===idx?' on':''}" onclick="play(${i})">${s.name}</div>`).join('');
}

/* ── MOBILE RENDER ── */
function setMob(t,msg=''){
  const c=document.getElementById('mob-content');
  if(t==='load')c.innerHTML=`<div class="sbox"><svg width="36" height="36" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path stroke-linecap="round" d="M12 2a10 10 0 0110 10"/></svg><p>Loading…</p></div>`;
  else if(t==='err')c.innerHTML=`<div class="sbox"><p style="color:var(--warn)">${msg}</p><p style="font-size:.78rem;margin-top:4px">Check API Key & Folder ID.</p></div>`;
}

function renderMobHome(list){
  const c=document.getElementById('mob-content');
  if(!list.length){c.innerHTML=`<div class="sbox">${NOTE}<p>No songs found</p></div>`;return;}
  c.innerHTML=`<div class="sec-title">🎵<span class="badge">${list.length}</span></div><div class="mob-grid">${list.map(s=>{
    const gi=songs.indexOf(s),t=thumb(s);
    return`<div class="card${gi===idx?' on':''}" onclick="play(${gi})" data-id="${s.id}">
      <div class="dot"></div>
      <div class="thumb">${t?`<img src="${t}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="tfb" style="display:none">${NOTE}</div>`:`<div class="tfb">${NOTE}</div>`}
        <div class="overlay"><div class="pbig"><svg width="14" height="14" fill="#000" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      </div>
      <div class="sname" title="${s.name}">${s.name}</div>
      <div class="sart">${s.artist}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderMobLiked(){
  const list=songs.filter(s=>liked.includes(s.id));
  const c=document.getElementById('mob-liked-content');
  if(!list.length){c.innerHTML=`<div class="sbox">${NOTE}<p>No liked songs yet</p></div>`;return;}
  c.innerHTML=mobListHTML(list);
}

function renderMobLib(){
  const c=document.getElementById('mob-lib-content');
  if(!songs.length){c.innerHTML=`<div class="sbox">${NOTE}<p>No songs loaded</p></div>`;return;}
  c.innerHTML=mobListHTML(songs);
}

function mobListHTML(list){
  return list.map(s=>{
    const gi=songs.indexOf(s),t=thumb(s);
    return`<div class="mob-list-item${gi===idx?' on':''}" onclick="play(${gi})" data-id="${s.id}">
      <div class="ml-thumb">${t?`<img src="${t}" alt="" onerror="this.style.display='none'">`:`${NOTE}`}</div>
      <div class="ml-meta"><div class="ml-name">${s.name}</div><div class="ml-art">${s.artist}</div></div>
      <div class="ml-play"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    </div>`;
  }).join('');
}

/* ── MOBILE NAV ── */
function mobView(v){
  mobCurrentView=v;
  ['home','liked','library'].forEach(n=>{
    document.getElementById('mob-'+n).classList.toggle('active',n===v);
    document.getElementById('mn-'+n).classList.toggle('on',n===v);
  });
  if(v==='liked')renderMobLiked();
  if(v==='library')renderMobLib();
}

/* ── PLAYBACK ── */
function play(i){
  if(i<0||i>=songs.length)return;
  idx=i;const s=songs[i];
  aud.src=streamUrl(s.id);
  aud.volume=document.getElementById('vsl')?.value/100||0.8;
  aud.play().catch(()=>toast('Playback error'));
  updatePlayerUI(s);
  // highlight cards everywhere
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll(`.card[data-id="${s.id}"]`).forEach(el=>el.classList.add('on'));
  document.querySelectorAll('.mob-list-item').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll(`.mob-list-item[data-id="${s.id}"]`).forEach(el=>el.classList.add('on'));
  document.getElementById('lib').querySelectorAll('.li').forEach((el,i2)=>el.classList.toggle('on',i2===idx));
}

function updatePlayerUI(s){
  const t=thumb(s);
  // desktop
  document.getElementById('ptitle').textContent=s.name;
  document.getElementById('partist').textContent=s.artist;
  const pimg=document.getElementById('pimg'),ptfb=document.getElementById('ptfb');
  if(t){pimg.src=t;pimg.style.display='block';ptfb.style.display='none';}
  else{pimg.style.display='none';ptfb.style.display='flex';}
  document.getElementById('hbtn').classList.toggle('on',liked.includes(s.id));
  // mobile mini player
  document.getElementById('mp-title').textContent=s.name;
  document.getElementById('mp-artist').textContent=s.artist;
  const mimg=document.getElementById('mp-img'),mtfb=document.getElementById('mp-tfb');
  if(t){mimg.src=t;mimg.style.display='block';mtfb.style.display='none';}
  else{mimg.style.display='none';mtfb.style.display='flex';}
  document.getElementById('mob-hbtn').classList.toggle('on',liked.includes(s.id));
}

function togglePlay(){
  if(!aud.src)return;
  aud.paused?aud.play():aud.pause();
}
function playNext(){
  if(!songs.length)return;
  let n;
  if(shuffle){const p=shuffleOrder.indexOf(idx);n=shuffleOrder[(p+1)%shuffleOrder.length];}
  else n=(idx+1)%songs.length;
  play(n);
}
function playPrev(){
  if(!songs.length)return;
  if(aud.currentTime>3){aud.currentTime=0;return;}
  let p;
  if(shuffle){const pos=shuffleOrder.indexOf(idx);p=shuffleOrder[(pos-1+shuffleOrder.length)%shuffleOrder.length];}
  else p=(idx-1+songs.length)%songs.length;
  play(p);
}
function toggleShuffle(){
  shuffle=!shuffle;
  document.getElementById('shbtn').classList.toggle('on',shuffle);
  if(shuffle)shuffleOrder=[...Array(songs.length).keys()].sort(()=>Math.random()-.5);
  toast(shuffle?'Shuffle on':'Shuffle off');
}
function toggleRepeat(){
  repeat=(repeat+1)%3;
  const btn=document.getElementById('rpbtn');
  btn.classList.toggle('on',repeat>0);
  btn.innerHTML=repeat===2
    ?`<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2v-5h-1l-2 1v1h1.5v3H13z"/></svg>`
    :`<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>`;
  toast(['Repeat off','Repeat all','Repeat one'][repeat]);
}
function toggleLike(){
  if(idx<0)return;
  const id=songs[idx].id;
  liked=liked.includes(id)?liked.filter(x=>x!==id):[...liked,id];
  localStorage.setItem('db_liked',JSON.stringify(liked));
  document.getElementById('hbtn').classList.toggle('on',liked.includes(id));
  document.getElementById('mob-hbtn').classList.toggle('on',liked.includes(id));
  toast(liked.includes(id)?'Added to liked':'Removed from liked');
  if(deskView==='liked')renderDesk(songs.filter(s=>liked.includes(s.id)));
  if(mobCurrentView==='liked')renderMobLiked();
}
function toggleMute(){
  aud.muted=!aud.muted;
  document.getElementById('vico').innerHTML=aud.muted
    ?'<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25A6.97 6.97 0 0114 18.92v2.06A8.99 8.99 0 0117.73 19l2 2L21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    :'<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}
function setVol(v){aud.volume=v/100;aud.muted=false;}

/* ── PROGRESS ── */
aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  const pct=aud.currentTime/aud.duration*100;
  document.getElementById('bar')?.style.setProperty('--p',pct+'%');
  document.getElementById('mob-prog-fill')?.style.setProperty('--p',pct+'%');
  document.getElementById('tcur').textContent=fmt(aud.currentTime);
  document.getElementById('tdur').textContent=fmt(aud.duration);
});
const playPath='<path d="M8 5v14l11-7z"/>';
const pausePath='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
aud.addEventListener('play',()=>{
  document.getElementById('ppico').innerHTML=pausePath;
  document.getElementById('mp-ico').innerHTML=pausePath;
});
aud.addEventListener('pause',()=>{
  document.getElementById('ppico').innerHTML=playPath;
  document.getElementById('mp-ico').innerHTML=playPath;
});
aud.addEventListener('ended',()=>{if(repeat===2){aud.play();return;}playNext();});

function seek(e){if(!aud.duration)return;aud.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*aud.duration;}
function fmt(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

let tt;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2300);}

document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')playNext();
  if(e.code==='ArrowLeft')playPrev();
});

loadSongs();
</script>
</body>
</html>
